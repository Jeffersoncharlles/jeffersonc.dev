name: CI (Integração Contínua)
on: [pull_request]

jobs:
  build:
    name: Validar Código 
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?sslmode=disable
      NODE_ENV: test
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'qualquer-string-de-32-caracteres-para-teste' }}
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      PAYLOAD_COOKIE_PREFIX: payload
      S3_BUCKET: test-bucket
      S3_ACCESS_KEY_ID: test-access-key
      S3_SECRET_ACCESS_KEY: test-secret-key
      S3_ENDPOINT: http://localhost:9000
      S3_PUBLIC_URL: http://localhost:9000/test-bucket
      RESEND_MAIL_API_KEY: re_test_123

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4 
        with:
          version: 10 

      - name: Instalar Dependências
        run: pnpm install --frozen-lockfile

      - name: Verificar Estilo (Lint)
        run: pnpm lint

      - name: Checagem de Tipagem (Typecheck)
        run: pnpm typecheck

      - name: Rodar Testes de Unidade
        run: pnpm test:coverage

      - name: Sincronizar Schema do Banco
        run: npx payload manage db:push

      - name: Gerar Build Final
        run: pnpm build